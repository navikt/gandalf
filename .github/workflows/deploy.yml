name: PROD- Build, push, and deploy

on:
  push:
    paths-ignore:
      - "README.md"
    branches:
      - master

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          java-version: 21
          cache: 'gradle'
          distribution: temurin
      - name: Run tests
        run: ./gradlew clean test
      - name: Unit tests results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: unit-tests-results
          path: build/reports/tests

  build:
    name: Build and push Docker container
    needs: test
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      telemetry: ${{ steps.docker-build-push.outputs.telemetry }}
      "image": ${{ steps.docker-build-push.outputs.image }}
    permissions:
      packages: "write"
      contents: "read"
      id-token: "write"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          java-version: 21
          cache: 'gradle'
          distribution: temurin
      - name: Build JAR
        run: ./gradlew bootJar -x test

      - name: Push docker image to GAR and sign image
        uses: nais/docker-build-push@cd5ec5663feb0e05c3fa374d1fb442605b046c6b # ratchet:nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: aura
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }} # Provided as Organization Secret
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }} # Provided as Organization Variable

      - name: Upload salsa
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: salsa
          path: ${{ steps.docker-build-push.outputs.salsa }}

  deploy-dev-t4:
    name: Deploy to NAIS dev (old t4)
    needs: build
    if: "github.ref == 'refs/heads/master'"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-fss
          RESOURCE: .nais/nais.yml
          VARS: .nais/t4-vars.yml
          VAR: image=${{ needs.build.outputs.image }}
          TIMEOUT: 15m
          TELEMETRY: ${{ needs.build.outputs.telemetry }}

  deploy-dev:
    name: Deploy to NAIS dev
    needs: [build, deploy-dev-t4]
    if: "github.ref == 'refs/heads/master'"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-fss
          RESOURCE: .nais/nais.yml
          VARS: .nais/default-vars.yml
          VAR: image=${{ needs.build.outputs.image }}
          TIMEOUT: 15m
          TELEMETRY: ${{ needs.build.outputs.telemetry }}

  deploy-prod:
    name: Deploy to NAIS prod
    needs: [build, deploy-dev, deploy-dev-t4]
    if: "github.ref == 'refs/heads/master'"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-fss
          RESOURCE: .nais/nais.yml
          VARS: .nais/prod-vars.yml
          VAR: image=${{ needs.build.outputs.image }}
          TIMEOUT: 15m
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
